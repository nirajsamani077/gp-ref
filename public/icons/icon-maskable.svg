<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3558"/>
      <stop offset="100%" stop-color="#2563a8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Maskable: full bleed, safe zone is inner 80% -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Power button: centre (256,256), radius 100 -->
  <line x1="256" y1="106" x2="256" y2="196" stroke="url(#accent)" stroke-width="30" stroke-linecap="round"/>
  <path d="M327.1 185.9 A100 100 0 1 1 184.9 185.9" fill="none" stroke="url(#accent)" stroke-width="30" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="256" y="410" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-1">GP Os</text>
